<script>
const KP='cp_plats', KC='cp_cajas', KR='cp_resps', KW='cp_weeks', KPR='cp_premios', KU='cp_users';
let currentTab=0, activePlatId='', activePlatName='', editingWeek='';

function ld(k, fallback=[]){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
function sv(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
const gP=()=>ld(KP); const sP=v=>sv(KP,v);
const gC=()=>ld(KC); const sC=v=>sv(KC,v);
const gR=()=>ld(KR); const sR=v=>sv(KR,v);
const gW=()=>ld(KW); const sW=v=>sv(KW,v);
const gPr=()=>ld(KPR); const sPr=v=>sv(KPR,v);
const gU=()=>ld(KU); const sU=v=>sv(KU,v);

function nid(){ return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function money(n){ return Number(n||0).toLocaleString('es-AR'); }
function normalizeDate(x){ if(x && x.fecha) return x.fecha; if(x && x.ts){ const d=new Date(x.ts); return d.toISOString().slice(0,10); } return ''; }
function fmtDate(s){ if(!s) return '-'; const p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function today(){ const d=new Date(); return d.toISOString().slice(0,10); }
function wkKey(ds){ const dt=ds?new Date(ds+'T12:00:00'):new Date(); const dw=dt.getDay(); const delta=(dw===0?-6:1-dw); const mon=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()+delta); return mon.toISOString().slice(0,10); }
function wkLabel(wk){ const s=new Date(wk+'T12:00:00'); const e=new Date(wk+'T12:00:00'); e.setDate(e.getDate()+6); const o={day:'2-digit',month:'short'}; return s.toLocaleDateString('es-AR',o)+' - '+e.toLocaleDateString('es-AR',o); }
function ensureWeek(wk){ const weeks=gW(); let found=weeks.find(w=>w.key===wk); if(!found){ found={key:wk,label:wkLabel(wk),status:'open',pct:null,negCarry:0,updatedAt:Date.now()}; weeks.push(found); sW(weeks); } return found; }
function currentWeek(){ const wk=wkKey(); ensureWeek(wk); document.getElementById('weekChip').textContent=wkLabel(wk); return wk; }
function weekObj(wk){ return gW().find(w=>w.key===wk) || ensureWeek(wk); }
function previousClosedCarry(wk){ const closed=gW().filter(w=>w.status==='closed' && w.key < wk).sort((a,b)=>a.key.localeCompare(b.key)); return closed.length ? Number(closed[closed.length-1].negCarry||0) : 0; }
function calcWeek(wk){
  const cargas=gC().filter(x=>x.wk===wk).reduce((a,b)=>a+Number(b.monto||0),0);
  const premios=gPr().filter(x=>x.wk===wk).reduce((a,b)=>a+Number(b.monto||0),0);
  const respaldos=gR().filter(x=>x.wk===wk).reduce((a,b)=>a+Number(b.monto||0),0);
  const carry=previousClosedCarry(wk);
  const egresos=respaldos;
  const saldo=(cargas-egresos)-carry;
  return {cargas,premios,respaldos,egresos,carry,saldo};
}
function updateUsers(name){
  const clean=(name||'').trim(); if(!clean) return;
  const users=gU(); const key=clean.toLowerCase();

}

function buildBackupPayload(){
  return {
    app:'Casino Online Pro',
    version:'v4',
    exportedAt:new Date().toISOString(),
    counts:{
      plataformas:gP().length,
      cajas:gC().length,
      premios:gPr().length,
      respaldos:gR().length,
      semanas:gW().length,
      usuarios:gU().length
    },
    data:{
      [KP]:gP(),
      [KC]:gC(),
      [KR]:gR(),
      [KW]:gW(),
      [KPR]:gPr(),
      [KU]:gU()
    }
  };
}
function fileStamp(){
  const d=new Date();
  const pad=n=>String(n).padStart(2,'0');
  return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'_'+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
}
function exportBackup(){
  try{
    const payload=buildBackupPayload();
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='casino_online_backup_'+fileStamp()+'.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1200);
    toast('Respaldo exportado');
  }catch(e){ toast('No se pudo exportar el respaldo',1); }
}
function quickExportBackup(){ exportBackup(); }
function importBackupFromInput(event){
  const file=event.target.files && event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const payload=JSON.parse(reader.result);
      if(!payload || !payload.data) throw new Error('invalid');
      [KP,KC,KR,KW,KPR,KU].forEach(key=>{
        if(!(key in payload.data)) throw new Error('missing');
      });
      if(!confirm('¿Restaurar este respaldo? Se van a reemplazar los datos actuales de esta app.')){ event.target.value=''; return; }
      sv(KP, payload.data[KP]);
      sv(KC, payload.data[KC]);
      sv(KR, payload.data[KR]);
      sv(KW, payload.data[KW]);
      sv(KPR, payload.data[KPR]);
      sv(KU, payload.data[KU]);
      event.target.value='';
      currentWeek();
      render();
      toast('Respaldo importado correctamente');
    }catch(err){
      event.target.value='';
      toast('Archivo inválido o incompleto',1);
    }
  };
  reader.readAsText(file);
}

function openCaja(pid,pname){ activePlatId=pid; activePlatName=pname; document.getElementById('mc-title').textContent='Registrar caja - '+pname; document.getElementById('mc-monto').value=''; document.getElementById('mc-fecha').value=today(); document.getElementById('mc-obs').value=''; openModal('mo-caja'); }
function savePlatform(){ const name=document.getElementById('mp-name').value.trim(); if(!name) return toast('Ingresá el nombre de la plataforma',1); const plats=gP(); plats.push({id:nid(),name,createdAt:Date.now()}); sP(plats); document.getElementById('mp-name').value=''; closeModal('mo-plat'); toast('Plataforma agregada'); renderPlats(); }
function deletePlatform(id){ if(!confirm('¿Eliminar esta plataforma?')) return; sP(gP().filter(x=>x.id!==id)); sC(gC().filter(x=>x.platId!==id)); toast('Plataforma eliminada'); render(); }
function saveCaja(){ const monto=Number(document.getElementById('mc-monto').value); const fecha=document.getElementById('mc-fecha').value; const obs=document.getElementById('mc-obs').value.trim(); if(!activePlatId) return toast('No hay plataforma seleccionada',1); if(!monto||monto<=0) return toast('Ingresá un monto válido',1); if(!fecha) return toast('Elegí una fecha',1); const wk=wkKey(fecha); ensureWeek(wk); const data=gC(); data.push({id:nid(),platId:activePlatId,monto,fecha,obs,wk,createdAt:Date.now()}); sC(data); closeModal('mo-caja'); toast('Caja guardada'); render(); }
function deleteCaja(id){ if(!confirm('¿Borrar esta caja?')) return; sC(gC().filter(x=>x.id!==id)); toast('Caja borrada'); render(); }

function openPremio(){ document.getElementById('mpr-user').value=''; document.getElementById('mpr-monto').value=''; document.getElementById('mpr-fecha').value=today(); document.getElementById('mpr-detalle').value=''; renderSuggestions(); openModal('mo-premio'); }
function renderSuggestions(){ const box=document.getElementById('userSuggest'); const q=document.getElementById('mpr-user').value.trim().toLowerCase(); const users=gU().slice().sort((a,b)=>(b.count||0)-(a.count||0) || (b.lastAt||0)-(a.lastAt||0)); const filtered=(q?users.filter(u=>u.name.toLowerCase().includes(q)):users).slice(0,8); if(!filtered.length){ box.classList.remove('on'); box.innerHTML=''; return; } box.innerHTML=filtered.map(u=>`<div class="suggest-item" onclick="pickUser('${escapeHtml(u.name).replace(/'/g,"\\'")}')"><b>${escapeHtml(u.name)}</b><div class="muted small">Usado ${u.count||1} ${u.count===1?'vez':'veces'}</div></div>`).join(''); box.classList.add('on'); }
function pickUser(name){ document.getElementById('mpr-user').value=name; document.getElementById('userSuggest').classList.remove('on'); }
function savePremio(){ const user=document.getElementById('mpr-user').value.trim(); const monto=Number(document.getElementById('mpr-monto').value); const fecha=document.getElementById('mpr-fecha').value; const detail=document.getElementById('mpr-detalle').value.trim(); if(!user) return toast('Ingresá el usuario',1); if(!monto||monto<=0) return toast('Ingresá un monto válido',1); if(!fecha) return toast('Elegí una fecha',1); const wk=wkKey(fecha); ensureWeek(wk); const arr=gPr(); arr.push({id:nid(),user,monto,fecha,detail,wk,createdAt:Date.now()}); sPr(arr); updateUsers(user); closeModal('mo-premio'); toast('Premio registrado'); render(); }
function deletePremio(id){ if(!confirm('¿Borrar este premio?')) return; sPr(gPr().filter(x=>x.id!==id)); toast('Premio borrado'); render(); }

function openResp(){ document.getElementById('mr-monto').value=''; document.getElementById('mr-fecha').value=today(); document.getElementById('mr-desc').value=''; openModal('mo-resp'); }
function saveResp(){ const monto=Number(document.getElementById('mr-monto').value); const fecha=document.getElementById('mr-fecha').value; const desc=document.getElementById('mr-desc').value.trim(); if(!monto||monto<=0) return toast('Ingresá un monto válido',1); if(!fecha) return toast('Elegí una fecha',1); const wk=wkKey(fecha); ensureWeek(wk); const arr=gR(); arr.push({id:nid(),monto,fecha,desc,wk,createdAt:Date.now()}); sR(arr); closeModal('mo-resp'); toast('Respaldo guardado'); render(); }
function deleteResp(id){ if(!confirm('¿Borrar este respaldo?')) return; sR(gR().filter(x=>x.id!==id)); toast('Respaldo borrado'); render(); }

function openCloseWeek(wk){ editingWeek=wk; const w=weekObj(wk); document.getElementById('closeTitle').textContent = (w.status==='closed' ? 'Editar cierre de semana' : 'Cerrar semana'); document.getElementById('closePct').value = w.pct!=null ? w.pct : ''; renderClosePreview(); openModal('mo-close'); }
function renderClosePreview(){ const wk=editingWeek || currentWeek(); const d=calcWeek(wk); const pct=Number(document.getElementById('closePct').value||0); const neg=d.saldo<0; document.getElementById('closeMsg').textContent = neg ? 'Saldo negativo. Comisión $0.' : 'Ingresá el porcentaje.'; document.getElementById('closePctWrap').style.display = neg ? 'none' : 'block'; const com=neg?0:Math.round(d.saldo*pct/100); document.getElementById('closePreview').innerHTML=`<div class="detail" style="margin-bottom:12px"><div class="detail-item"><div class="detail-main"><strong>Cajas</strong></div><div class="money" style="color:var(--gold2)">$${money(d.cargas)}</div></div><div class="detail-item"><div class="detail-main"><strong>Premios</strong><span>Solo control interno</span></div><div class="money" style="color:var(--orange)">$${money(d.premios)}</div></div><div class="detail-item"><div class="detail-main"><strong>Respaldos</strong></div><div class="money" style="color:var(--red)">-$${money(d.respaldos)}</div></div><div class="detail-item"><div class="detail-main"><strong>Arrastre anterior</strong></div><div class="money" style="color:${d.carry?'var(--red)':'var(--muted)'}">${d.carry?'-$'+money(d.carry):'$0'}</div></div><div class="detail-item"><div class="detail-main"><strong>Saldo neto</strong></div><div class="money" style="color:${neg?'var(--red)':'var(--blue)'}">${neg?'-$':'$'}${money(Math.abs(d.saldo))}</div></div><div class="detail-item"><div class="detail-main"><strong>Comisión</strong></div><div class="money" style="color:var(--green)">$${money(com)}</div></div></div>`; }
function confirmCloseWeek(){ const wk=editingWeek || currentWeek(); const d=calcWeek(wk); const neg=d.saldo<0; const pct=neg?0:Number(document.getElementById('closePct').value||0); if(!neg && !pct) return toast('Ingresá el porcentaje',1); const weeks=gW(); const idx=weeks.findIndex(w=>w.key===wk); if(idx>=0){ weeks[idx].status='closed'; weeks[idx].pct=pct; weeks[idx].negCarry=neg?Math.abs(d.saldo):0; weeks[idx].updatedAt=Date.now(); } else { weeks.push({key:wk,label:wkLabel(wk),status:'closed',pct,negCarry:neg?Math.abs(d.saldo):0,updatedAt:Date.now()}); }
  sW(weeks); closeModal('mo-close'); toast('Cierre guardado'); render(); }
function reopenWeek(wk){ if(!confirm('¿Reabrir esta semana para seguir corrigiendo?')) return; const weeks=gW(); const idx=weeks.findIndex(w=>w.key===wk); if(idx>=0){ weeks[idx].status='open'; weeks[idx].pct=null; weeks[idx].negCarry=0; weeks[idx].updatedAt=Date.now(); sW(weeks); toast('Semana reabierta'); render(); } }

let toastTimer=null;
function toast(msg,err){ const el=document.getElementById('toast'); el.textContent=msg; el.className='on'+(err?' err':''); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.className='',2200); }

document.addEventListener('click', e=>{ if(!e.target.closest('.suggest-box')) document.getElementById('userSuggest').classList.remove('on'); });
currentWeek();
setTimeout(()=>{
  const ws=document.getElementById('welcomeScreen');
  const app=document.getElementById('appShell');
  if(ws && app && getComputedStyle(app).display==='none') enterApp();
},1000);
</script>
</body>
</html>
