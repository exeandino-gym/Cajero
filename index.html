<style>
:root{
  --bg:#120a03;
  --bg2:#1a1006;
  --panel:#201308;
  --panel2:#2a180a;
  --line:#4c300e;
  --gold:#d8ae3d;
  --gold2:#f6d06a;
  --text:#f8ead0;
  --muted:#aa8f67;
  --green:#22c55e;
  --red:#ef4444;
  --blue:#60a5fa;
  --orange:#fb923c;
  --shadow:0 10px 30px rgba(0,0,0,.35);
  --r:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:radial-gradient(circle at top,#2b1808 0%,#140b04 35%,#090502 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{min-height:100vh}
button,input{font:inherit}
.topbar{
  position:sticky;top:0;z-index:20;
  backdrop-filter:blur(10px);
  background:linear-gradient(180deg,rgba(28,17,7,.97),rgba(18,10,3,.94));
  border-bottom:1px solid rgba(216,174,61,.18);
  padding:14px 16px 12px;
}
.brandRow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{font-size:24px;font-weight:900;letter-spacing:-.6px;color:var(--gold2);text-shadow:0 0 20px rgba(246,208,106,.18)}
.brand small{display:block;font-size:11px;font-weight:700;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.week-chip{padding:8px 12px;border-radius:999px;background:linear-gradient(135deg,#2d1b08,#1d1308);border:1px solid rgba(216,174,61,.22);color:var(--gold2);font-size:12px;font-weight:800;white-space:nowrap}
.nav{display:flex;gap:10px;overflow:auto;padding:12px 0 2px}
.nav::-webkit-scrollbar{display:none}
.tab{border:none;background:#221408;color:var(--muted);padding:10px 14px;border-radius:999px;font-weight:800;white-space:nowrap;border:1px solid rgba(216,174,61,.12)}
.tab.on{background:linear-gradient(135deg,#d8ae3d,#a77415);color:#130b03;box-shadow:0 6px 20px rgba(216,174,61,.25)}
.main{max-width:860px;margin:0 auto;padding:18px 14px 34px}
.page{display:none}.page.on{display:block}
.hero{background:linear-gradient(135deg,rgba(42,24,10,.95),rgba(24,14,7,.96));border:1px solid rgba(216,174,61,.16);border-radius:24px;padding:18px;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden}
.hero:before{content:'';position:absolute;inset:auto -20% 55% auto;width:220px;height:220px;background:radial-gradient(circle,rgba(246,208,106,.18),transparent 70%)}
.hero-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin:0 0 6px}
.hero-sub{color:var(--muted);font-size:14px;line-height:1.45;margin:0}
.row{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:14px;padding:13px 16px;font-weight:900;cursor:pointer;transition:.15s transform,.15s opacity;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.98);opacity:.88}
.btn-gold{background:linear-gradient(135deg,var(--gold2),#b57d1a);color:#140b04;box-shadow:0 8px 24px rgba(216,174,61,.22)}
.btn-dark{background:#211408;color:var(--text);border:1px solid rgba(216,174,61,.14)}
.btn-red{background:transparent;color:#ff8d8d;border:1px solid rgba(239,68,68,.45)}
.btn-green{background:#25d366;color:#fff}
.btn-blue{background:rgba(96,165,250,.14);color:#b9d8ff;border:1px solid rgba(96,165,250,.28)}
.btn-sm{padding:8px 12px;border-radius:11px;font-size:12px;font-weight:800}
.btn-full{width:100%}
.grid{display:grid;gap:12px}
.stats{grid-template-columns:repeat(2,1fr);margin-bottom:16px}
@media(min-width:700px){.stats{grid-template-columns:repeat(4,1fr)}}
.card,.list-card,.stat,.detail{background:linear-gradient(180deg,rgba(33,20,8,.96),rgba(24,15,8,.96));border:1px solid rgba(216,174,61,.12);border-radius:20px;box-shadow:var(--shadow)}
.stat{padding:16px;position:relative;overflow:hidden}
.stat:before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,var(--gold),transparent)}
.stat .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:800;margin-bottom:8px}
.stat .value{font-size:28px;font-weight:900;line-height:1;letter-spacing:-.8px}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 16px 0}
.section-title{font-size:18px;font-weight:900;margin:0}
.section-sub{color:var(--muted);font-size:13px;margin:4px 0 0}
.card-body{padding:16px}
.table-wrap{overflow:auto}
table{width:100%;border-collapse:collapse;min-width:560px}
th,td{padding:12px 10px;border-bottom:1px solid rgba(216,174,61,.08);text-align:left}
th{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
td{font-size:14px}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:900;letter-spacing:.5px}
.badge-open{background:rgba(34,197,94,.12);color:#83f3a9;border:1px solid rgba(34,197,94,.28)}
.badge-closed{background:rgba(216,174,61,.1);color:var(--gold2);border:1px solid rgba(216,174,61,.22)}
.badge-neg{background:rgba(239,68,68,.12);color:#ff9f9f;border:1px solid rgba(239,68,68,.28)}
.empty{padding:34px 16px;text-align:center;color:var(--muted)}
.empty strong{display:block;color:var(--text);font-size:18px;margin-bottom:8px}
.form-grid{display:grid;gap:12px}
@media(min-width:700px){.form-grid.cols-2{grid-template-columns:1fr 1fr}.form-grid.cols-3{grid-template-columns:1.2fr .8fr .8fr}}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.9px;color:var(--muted);font-weight:800;margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:#120b05;border:1px solid rgba(216,174,61,.16);border-radius:14px;padding:13px 14px;color:var(--text);outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:rgba(246,208,106,.55);box-shadow:0 0 0 3px rgba(216,174,61,.08)}
.field textarea{min-height:92px;resize:vertical}
.suggest-box{position:relative}
.suggest-list{position:absolute;left:0;right:0;top:100%;margin-top:6px;background:#1b1107;border:1px solid rgba(216,174,61,.18);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);max-height:220px;overflow:auto;display:none;z-index:12}
.suggest-list.on{display:block}
.suggest-item{padding:11px 13px;border-bottom:1px solid rgba(216,174,61,.08);cursor:pointer}
.suggest-item:last-child{border-bottom:none}
.suggest-item b{color:var(--gold2)}
.muted{color:var(--muted)}
.week-card{margin-bottom:14px}
.week-head{padding:16px;border-bottom:1px solid rgba(216,174,61,.1);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap}
.week-title{font-size:18px;font-weight:900;color:var(--gold2)}
.week-actions{display:flex;gap:8px;flex-wrap:wrap}
.report{padding:16px}
.split{display:grid;gap:12px}
@media(min-width:850px){.split{grid-template-columns:1.15fr .85fr}}
.detail{padding:14px}
.detail h4{margin:0 0 10px;font-size:14px;color:var(--gold2)}
.detail-item{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid rgba(216,174,61,.08);align-items:flex-start}
.detail-item:last-child{border-bottom:none}
.detail-main{flex:1}
.detail-main strong{display:block;font-size:14px}
.detail-main span{display:block;font-size:12px;color:var(--muted);margin-top:3px}
.money{font-variant-numeric:tabular-nums;font-weight:900}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:60;padding-top:40px}
.overlay.on{display:flex}
.modal{width:100%;max-width:620px;background:linear-gradient(180deg,#211408,#171008);border:1px solid rgba(216,174,61,.18);border-top-left-radius:24px;border-top-right-radius:24px;box-shadow:var(--shadow);padding:20px 16px 18px;max-height:92vh;overflow:auto}
.modal-title{font-size:20px;font-weight:900;color:var(--gold2);margin:0 0 14px}
.modal-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.modal-actions .btn{flex:1}
#toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(16px);opacity:0;transition:.2s;background:var(--gold2);color:#140b04;padding:10px 16px;border-radius:999px;font-weight:900;z-index:80;box-shadow:var(--shadow);pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err{background:#ef4444;color:#fff}
.small{font-size:12px}

.hidden{display:none!important}
#welcomeScreen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at 18% 18%, rgba(246,208,106,.22), transparent 24%),
    radial-gradient(circle at 82% 12%, rgba(216,174,61,.14), transparent 20%),
    radial-gradient(circle at 50% 100%, rgba(96,165,250,.08), transparent 30%),
    linear-gradient(180deg,#0d0702 0%,#170d05 45%,#080401 100%);
}
#welcomeScreen:before{content:'';position:absolute;inset:auto -15% -20% auto;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(246,208,106,.14),transparent 68%);filter:blur(4px)}
.welcome-wrap{width:100%;max-width:560px;display:block}
.welcome-main{
  background:linear-gradient(180deg,rgba(33,20,8,.94),rgba(14,9,5,.98));
  border:1px solid rgba(216,174,61,.14);
  border-radius:32px;
  box-shadow:var(--shadow);
  padding:34px 24px 30px;
  position:relative;
  overflow:hidden;
  text-align:center;
}
.welcome-main:before{
  content:'';position:absolute;left:50%;top:-90px;transform:translateX(-50%);
  width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(246,208,106,.20),transparent 66%);
}
.welcome-mini{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:900;position:relative}
.welcome-logo{position:relative;width:98px;height:98px;border-radius:28px;margin:10px auto 18px;display:flex;align-items:center;justify-content:center;font-size:48px;background:linear-gradient(145deg,rgba(246,208,106,.16),rgba(216,174,61,.05));border:1px solid rgba(216,174,61,.22);box-shadow:0 0 0 1px rgba(216,174,61,.08) inset,0 14px 44px rgba(0,0,0,.35)}
.welcome-logo:after{content:'';position:absolute;inset:10px;border-radius:22px;border:1px solid rgba(246,208,106,.14)}
.welcome-title{font-size:46px;line-height:.95;margin:0 0 10px;font-weight:900;letter-spacing:-1.8px;color:var(--gold2);position:relative}
.welcome-title span{display:block;color:var(--text);font-size:22px;letter-spacing:-.4px;margin-top:10px}
.welcome-text{font-size:14px;line-height:1.5;color:var(--muted);max-width:420px;margin:0 auto;position:relative}
.auto-pill{margin:18px auto 0;display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(216,174,61,.08);border:1px solid rgba(216,174,61,.14);color:var(--gold2);font-size:12px;font-weight:800;position:relative}
.auto-dot{width:8px;height:8px;border-radius:50%;background:var(--gold2);box-shadow:0 0 10px rgba(246,208,106,.7);animation:pulseDot 1s infinite}
@keyframes pulseDot{0%,100%{opacity:.35;transform:scale(.95)}50%{opacity:1;transform:scale(1.15)}}
.backup-fab{position:absolute;top:18px;right:18px;width:42px;height:42px;border:none;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(17,10,5,.72);color:var(--gold2);border:1px solid rgba(216,174,61,.18);box-shadow:0 10px 30px rgba(0,0,0,.28);cursor:pointer;font-size:17px;z-index:3}
.backup-fab:active{transform:scale(.97)}
.app-shell{display:none}
.backup-drop{padding:16px;border:1px dashed rgba(216,174,61,.28);border-radius:20px;background:rgba(216,174,61,.04)}
.backup-note{font-size:13px;color:var(--muted);line-height:1.5}
.backup-file{display:none}
.top-tools{display:flex;align-items:center;gap:10px}
.icon-btn{width:38px;height:38px;border-radius:999px;border:1px solid rgba(216,174,61,.16);background:#221408;color:var(--gold2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.22)}
.icon-btn:active{transform:scale(.97)}
.welcome-main.premium{position:relative;overflow:hidden;isolation:isolate}
.welcome-main.premium:before{
  content:'';position:absolute;inset:-30% -20% auto auto;width:260px;height:260px;
  background:radial-gradient(circle,rgba(246,208,106,.22),transparent 68%);
  z-index:-1;filter:blur(4px)
}
.welcome-orbit{
  position:absolute;border:1px solid rgba(246,208,106,.12);border-radius:999px;pointer-events:none
}
.orbit-1{width:240px;height:240px;top:26px;left:50%;transform:translateX(-50%);animation:spinSlow 16s linear infinite}
.orbit-2{width:178px;height:178px;top:57px;left:50%;transform:translateX(-50%);animation:spinSlow 11s linear reverse infinite}
@keyframes spinSlow{from{transform:translateX(-50%) rotate(0deg)}to{transform:translateX(-50%) rotate(360deg)}}

</style>
</head>
<body>
  <section id="welcomeScreen">
    <button class="backup-fab" onclick="quickExportBackup()" title="Respaldo rápido" aria-label="Respaldo rápido">☁</button>
    <div class="welcome-wrap">
      <div class="welcome-main">
        <div class="welcome-mini">Gestión profesional</div>
        <div class="welcome-logo">🎰</div>
        <h1 class="welcome-title">Casino Online <span>Control semanal Pro</span></h1>
        
        <div class="auto-pill"><span class="auto-dot"></span>Ingresando al panel...</div>
      </div>
    </div>
  </section>

  <div id="appShell" class="app-shell">
  <div class="topbar">
    <div class="brandRow">
      <div class="brand">🎰 Casino Online <small>Panel Pro</small></div>
      <div class="top-tools"><button class="icon-btn" onclick="openSecurityTab()" title="Respaldo" aria-label="Respaldo">☁</button><div class="week-chip" id="weekChip">--</div></div>
    </div>
    <div class="nav">
      <button class="tab on" onclick="goTab(0)">Semana</button>
      <button class="tab" onclick="goTab(1)">Plataformas</button>
      <button class="tab" onclick="goTab(2)">Premios</button>
      <button class="tab" onclick="goTab(3)">Respaldos</button>
      <button class="tab" onclick="goTab(4)">Historial</button>
      <button class="tab" onclick="goTab(5)">Seguridad</button>
    </div>
  </div>

  <main class="main">
    <section class="page on" id="pg0"></section>
    <section class="page" id="pg1"></section>
    <section class="page" id="pg2"></section>
    <section class="page" id="pg3"></section>
    <section class="page" id="pg4"></section>
    <section class="page" id="pg5"></section>
  </main>
  </div>

  <div class="overlay" id="mo-plat"><div class="modal">
    <h3 class="modal-title">Nueva plataforma</h3>
    <div class="field"><label>Nombre</label><input id="mp-name" placeholder="Ej: Rhino, Ganamos, Bplay" /></div>
    <div class="modal-actions"><button class="btn btn-dark" onclick="closeModal('mo-plat')">Cancelar</button><button class="btn btn-gold" onclick="savePlatform()">Guardar</button></div>
  </div></div>

  <div class="overlay" id="mo-caja"><div class="modal">
    <h3 class="modal-title" id="mc-title">Registrar caja</h3>
    <div class="form-grid cols-2">
      <div class="field"><label>Monto</label><input id="mc-monto" type="number" inputmode="numeric" placeholder="Ej: 300000" /></div>
      <div class="field"><label>Fecha</label><input id="mc-fecha" type="date" /></div>
    </div>
    <div class="field"><label>Observación</label><input id="mc-obs" placeholder="Ej: turno mañana" /></div>
    <div class="modal-actions"><button class="btn btn-dark" onclick="closeModal('mo-caja')">Cancelar</button><button class="btn btn-gold" onclick="saveCaja()">Guardar</button></div>
  </div></div>

  <div class="overlay" id="mo-premio"><div class="modal">
    <h3 class="modal-title">Registrar premio pagado</h3>
    <div class="form-grid cols-3">
      <div class="field suggest-box">
        <label>Usuario</label>
        <input id="mpr-user" placeholder="Nombre o número" autocomplete="off" oninput="renderSuggestions()" onfocus="renderSuggestions()" />
        <div class="suggest-list" id="userSuggest"></div>
      </div>
      <div class="field"><label>Monto</label><input id="mpr-monto" type="number" inputmode="numeric" placeholder="Ej: 50000" /></div>
      <div class="field"><label>Fecha</label><input id="mpr-fecha" type="date" /></div>
    </div>
    <div class="field"><label>Detalle</label><input id="mpr-detalle" placeholder="Ej: punto 2, premio semana, ruleta" /></div>
    <div class="modal-actions"><button class="btn btn-dark" onclick="closeModal('mo-premio')">Cancelar</button><button class="btn btn-gold" onclick="savePremio()">Guardar</button></div>
  </div></div>

  <div class="overlay" id="mo-resp"><div class="modal">
    <h3 class="modal-title">Registrar respaldo</h3>
    <div class="form-grid cols-2">
      <div class="field"><label>Monto</label><input id="mr-monto" type="number" inputmode="numeric" placeholder="Ej: 50000" /></div>
      <div class="field"><label>Fecha</label><input id="mr-fecha" type="date" /></div>
    </div>
    <div class="field"><label>Descripción</label><input id="mr-desc" placeholder="Ej: premio jackpot, ajuste" /></div>
    <div class="modal-actions"><button class="btn btn-dark" onclick="closeModal('mo-resp')">Cancelar</button><button class="btn btn-gold" onclick="saveResp()">Guardar</button></div>
  </div></div>

  <div class="overlay" id="mo-close"><div class="modal">
    <h3 class="modal-title" id="closeTitle">Cerrar semana</h3>
    <p class="muted small" id="closeMsg">Podés cerrar la semana ahora o volver a editarla más tarde desde el historial.</p>
    <div id="closePreview"></div>
    <div class="field" id="closePctWrap"><label>Porcentaje de comisión</label><input id="closePct" type="number" inputmode="numeric" placeholder="Ej: 50" oninput="renderClosePreview()" /></div>
    <div class="modal-actions"><button class="btn btn-dark" onclick="closeModal('mo-close')">Cancelar</button><button class="btn btn-gold" onclick="confirmCloseWeek()">Guardar cierre</button></div>
  </div></div>

  <div id="toast"></div>
  <input id="backupFileInput" class="backup-file" type="file" accept="application/json,.json" onchange="importBackupFromInput(event)" />

<script>
const KP='cp_plats', KC='cp_cajas', KR='cp_resps', KW='cp_weeks', KPR='cp_premios', KU='cp_users';
let currentTab=0, activePlatId='', activePlatName='', editingWeek='';

function ld(k, fallback=[]){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
function sv(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
const gP=()=>ld(KP); const sP=v=>sv(KP,v);
const gC=()=>ld(KC); const sC=v=>sv(KC,v);
const gR=()=>ld(KR); const sR=v=>sv(KR,v);
const gW=()=>ld(KW); const sW=v=>sv(KW,v);
const gPr=()=>ld(KPR); const sPr=v=>sv(KPR,v);
const gU=()=>ld(KU); const sU=v=>sv(KU,v);

function nid(){ return 'i'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function money(n){ return Number(n||0).toLocaleString('es-AR'); }
function normalizeDate(x){ if(x && x.fecha) return x.fecha; if(x && x.ts){ const d=new Date(x.ts); return d.toISOString().slice(0,10); } return ''; }
function fmtDate(s){ if(!s) return '-'; const p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }
function today(){ const d=new Date(); return d.toISOString().slice(0,10); }
function wkKey(ds){ const dt=ds?new Date(ds+'T12:00:00'):new Date(); const dw=dt.getDay(); const delta=(dw===0?-6:1-dw); const mon=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()+delta); return mon.toISOString().slice(0,10); }
function wkLabel(wk){ const s=new Date(wk+'T12:00:00'); const e=new Date(wk+'T12:00:00'); e.setDate(e.getDate()+6); const o={day:'2-digit',month:'short'}; return s.toLocaleDateString('es-AR',o)+' - '+e.toLocaleDateString('es-AR',o); }
function ensureWeek(wk){ const weeks=gW(); let found=weeks.find(w=>w.key===wk); if(!found){ found={key:wk,label:wkLabel(wk),status:'open',pct:null,negCarry:0,updatedAt:Date.now()}; weeks.push(found); sW(weeks); } return found; }
function currentWeek(){ const wk=wkKey(); ensureWeek(wk); document.getElementById('weekChip').textContent=wkLabel(wk); return wk; }
function weekObj(wk){ return gW().find(w=>w.key===wk) || ensureWeek(wk); }
function previousClosedCarry(wk){ const closed=gW().filter(w=>w.status==='closed' && w.key < wk).sort((a,b)=>a.key.localeCompare(b.key)); return closed.length ? Number(closed[closed.length-1].negCarry||0) : 0; }
function calcWeek(wk){
  const cargas=gC().filter(x=>x.wk===wk).reduce((a,b)=>a+Number(b.monto||0),0);
  const premios=gPr().filter(x=>x.wk===wk).reduce((a,b)=>a+Number(b.monto||0),0);
  const respaldos=gR().filter(x=>x.wk===wk).reduce((a,b)=>a+Number(b.monto||0),0);
  const carry=previousClosedCarry(wk);
  const egresos=respaldos;
  const saldo=(cargas-egresos)-carry;
  return {cargas,premios,respaldos,egresos,carry,saldo};
}
function updateUsers(name){
  const clean=(name||'').trim(); if(!clean) return;
  const users=gU(); const key=clean.toLowerCase();
  const ex=users.find(u=>u.key===key);
  if(ex){ ex.name=clean; ex.count=(ex.count||0)+1; ex.lastAt=Date.now(); }
  else users.push({id:nid(),key,name:clean,count:1,lastAt:Date.now()});
  users.sort((a,b)=> (b.lastAt||0)-(a.lastAt||0));
  sU(users);
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
function findPlatName(id){ const p=gP().find(x=>x.id===id); return p?p.name:'-'; }

function goTab(n){
  currentTab=n;
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',i===n));
  document.querySelectorAll('.page').forEach((el,i)=>el.classList.toggle('on',i===n));
  render();
}
function render(){ currentWeek(); if(currentTab===0) renderSemana(); if(currentTab===1) renderPlats(); if(currentTab===2) renderPremios(); if(currentTab===3) renderRespaldos(); if(currentTab===4) renderHistorial(); if(currentTab===5) renderSeguridad(); }

function renderSemana(){
  const wk=currentWeek(); const d=calcWeek(wk); const w=weekObj(wk);
  const saldoColor=d.saldo<0?'var(--red)':'var(--blue)';
  const saldoText=(d.saldo<0?'-$':'$')+money(Math.abs(d.saldo));
  const commission=(w.status==='closed' && d.saldo>0 && w.pct)? Math.round(d.saldo*Number(w.pct)/100):0;
  const html=`
    <div class="hero">
      <h1 class="hero-title">Semana</h1>
      
      <div class="row" style="margin-top:14px">
        <button class="btn btn-gold" onclick="goTab(1)">+ Cargar caja</button>
        <button class="btn btn-dark" onclick="openPremio()">+ Premio pagado</button>
        <button class="btn btn-dark" onclick="openResp()">+ Respaldo</button>
        <button class="btn btn-blue" onclick="openCloseWeek('${wk}')">Cerrar / editar cierre</button>
      </div>
    </div>
    <div class="grid stats">
      <div class="stat"><div class="label">Total cajas</div><div class="value" style="color:var(--gold2)">$${money(d.cargas)}</div></div>
      <div class="stat"><div class="label">Premios</div><div class="value" style="color:var(--orange)">$${money(d.premios)}</div><div class="hint">Solo control interno</div></div>
      <div class="stat"><div class="label">Respaldos</div><div class="value" style="color:var(--red)">$${money(d.respaldos)}</div></div>
      <div class="stat"><div class="label">Saldo neto</div><div class="value" style="color:${saldoColor}">${saldoText}</div></div>
    </div>
    <div class="split">
      <div class="card">
        <div class="section-head"><div><h3 class="section-title">Resumen de la semana</h3><p class="section-sub">Todo lo que impacta el cierre actual.</p></div><span class="badge ${w.status==='closed'?'badge-closed':'badge-open'}">${w.status==='closed'?'SEMANA CERRADA':'SEMANA ABIERTA'}</span></div>
        <div class="card-body">
          <div class="detail-item"><div class="detail-main"><strong>Ingreso por cajas</strong><span>Total cargado en plataformas</span></div><div class="money" style="color:var(--gold2)">$${money(d.cargas)}</div></div>
          <div class="detail-item"><div class="detail-main"><strong>Premios cargados</strong><span>Control interno, no descuenta del saldo</span></div><div class="money" style="color:var(--orange)">$${money(d.premios)}</div></div>
          <div class="detail-item"><div class="detail-main"><strong>Egreso por respaldos</strong><span>Respaldos</span></div><div class="money" style="color:var(--red)">-$${money(d.respaldos)}</div></div>
          <div class="detail-item"><div class="detail-main"><strong>Arrastre anterior</strong><span>Saldo negativo descontado</span></div><div class="money" style="color:${d.carry? 'var(--red)' : 'var(--muted)'}">${d.carry? '-$'+money(d.carry) : '$0'}</div></div>
          <div class="detail-item"><div class="detail-main"><strong>Tu comisión</strong><span>${w.status==='closed' ? 'Calculada con cierre guardado' : 'Se define al cerrar la semana'}</span></div><div class="money" style="color:var(--green)">$${money(commission)}</div></div>
        </div>
      </div>
      <div class="card">
        <div class="section-head"><div><h3 class="section-title">Movimiento rápido</h3><p class="section-sub">Lo último cargado esta semana.</p></div></div>
        <div class="card-body">${renderMiniFeed(wk)}</div>
      </div>
    </div>`;
  document.getElementById('pg0').innerHTML=html;
}
function renderMiniFeed(wk){
  const items=[];
  gC().filter(x=>x.wk===wk).forEach(x=>items.push({type:'Caja', color:'var(--gold2)', text:findPlatName(x.platId)+' · '+fmtDate(normalizeDate(x)), amount:'+$'+money(x.monto), ts:new Date(normalizeDate(x)+'T12:00:00').getTime(), note:x.obs||''}));
  gPr().filter(x=>x.wk===wk).forEach(x=>items.push({type:'Premio', color:'var(--orange)', text:x.user+' · '+fmtDate(normalizeDate(x)), amount:'-$'+money(x.monto), ts:new Date(normalizeDate(x)+'T12:00:00').getTime(), note:x.detail||''}));
  gR().filter(x=>x.wk===wk).forEach(x=>items.push({type:'Respaldo', color:'var(--red)', text:(x.desc||'Sin descripción')+' · '+fmtDate(normalizeDate(x)), amount:'-$'+money(x.monto), ts:new Date(normalizeDate(x)+'T12:00:00').getTime(), note:''}));
  items.sort((a,b)=>b.ts-a.ts);
  if(!items.length) return '<div class="empty"><strong>Sin movimientos todavía</strong>Empezá cargando una caja, un premio o un respaldo.</div>';
  return items.slice(0,8).map(it=>`<div class="detail-item"><div class="detail-main"><strong style="color:${it.color}">${it.type}</strong><span>${escapeHtml(it.text)}${it.note?' · '+escapeHtml(it.note):''}</span></div><div class="money" style="color:${it.color}">${it.amount}</div></div>`).join('');
}

function renderPlats(){
  const wk=currentWeek();
  const plats=gP();
  let html=`<div class="hero"><h1 class="hero-title">Plataformas</h1><div class="row" style="margin-top:14px"><button class="btn btn-gold" onclick="openModal('mo-plat')">+ Nueva plataforma</button></div></div>`;
  if(!plats.length){ html+=`<div class="card"><div class="empty"><strong>No tenés plataformas todavía</strong>Creá la primera y empezá a cargar cajas.</div></div>`; document.getElementById('pg1').innerHTML=html; return; }
  plats.forEach(p=>{
    const arr=gC().filter(x=>x.platId===p.id && x.wk===wk).sort((a,b)=>normalizeDate(b).localeCompare(normalizeDate(a))); 
    const total=arr.reduce((a,b)=>a+Number(b.monto||0),0);
    html+=`<div class="list-card week-card"><div class="week-head"><div><div class="week-title">${escapeHtml(p.name)}</div><div class="muted small">Total de la semana: <span class="money" style="color:var(--gold2)">$${money(total)}</span></div></div><div class="week-actions"><button class="btn btn-gold btn-sm" onclick="openCaja('${p.id}','${escapeHtml(p.name).replace(/'/g,"\\'")}')">+ Caja</button><button class="btn btn-red btn-sm" onclick="deletePlatform('${p.id}')">Eliminar</button></div></div>`;
    if(!arr.length) html+=`<div class="report"><div class="empty"><strong>Sin cajas esta semana</strong>Podés cargar una ahora o cargar una fecha pasada.</div></div></div>`;
    else html+=`<div class="report"><div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Monto</th><th>Obs.</th><th></th></tr></thead><tbody>${arr.map(x=>`<tr><td>${fmtDate(normalizeDate(x))}</td><td class="money" style="color:var(--gold2)">$${money(x.monto)}</td><td>${escapeHtml(x.obs||'-')}</td><td><button class="btn btn-red btn-sm" onclick="deleteCaja('${x.id}')">Borrar</button></td></tr>`).join('')}</tbody></table></div></div></div>`;
  });
  document.getElementById('pg1').innerHTML=html;
}

function renderPremios(){
  const wk=currentWeek();
  const arr=gPr().filter(x=>x.wk===wk).sort((a,b)=>normalizeDate(b).localeCompare(normalizeDate(a))||((b.createdAt||0)-(a.createdAt||0))); 
  const total=arr.reduce((a,b)=>a+Number(b.monto||0),0);
  let html=`<div class="hero"><h1 class="hero-title">Premios</h1><div class="row" style="margin-top:14px"><button class="btn btn-gold" onclick="openPremio()">+ Registrar premio</button></div></div>`;
  html+=`<div class="grid stats"><div class="stat"><div class="label">Premios de esta semana</div><div class="value" style="color:var(--orange)">$${money(total)}</div></div><div class="stat"><div class="label">Usuarios usados</div><div class="value" style="color:var(--gold2)">${gU().length}</div></div></div>`;
  if(!arr.length){ html+=`<div class="card"><div class="empty"><strong>No hay premios cargados</strong>Cuando registres el primero, acá va a quedar ordenado y editable.</div></div>`; document.getElementById('pg2').innerHTML=html; return; }
  html+=`<div class="card"><div class="section-head"><div><h3 class="section-title">Listado semanal</h3></div></div><div class="card-body table-wrap"><table><thead><tr><th>Usuario</th><th>Fecha</th><th>Detalle</th><th>Monto</th><th></th></tr></thead><tbody>${arr.map(x=>`<tr><td><strong>${escapeHtml(x.user)}</strong></td><td>${fmtDate(normalizeDate(x))}</td><td>${escapeHtml(x.detail||'-')}</td><td class="money" style="color:var(--orange)">$${money(x.monto)}</td><td><button class="btn btn-red btn-sm" onclick="deletePremio('${x.id}')">Borrar</button></td></tr>`).join('')}</tbody></table></div></div>`;
  document.getElementById('pg2').innerHTML=html;
}

function renderRespaldos(){
  const wk=currentWeek();
  const arr=gR().filter(x=>x.wk===wk).sort((a,b)=>normalizeDate(b).localeCompare(normalizeDate(a))||((b.createdAt||0)-(a.createdAt||0))); 
  const total=arr.reduce((a,b)=>a+Number(b.monto||0),0);
  let html=`<div class="hero"><h1 class="hero-title">Respaldos</h1><div class="row" style="margin-top:14px"><button class="btn btn-gold" onclick="openResp()">+ Registrar respaldo</button></div></div>`;
  html+=`<div class="grid stats"><div class="stat"><div class="label">Respaldos de esta semana</div><div class="value" style="color:var(--red)">$${money(total)}</div></div></div>`;
  if(!arr.length){ html+=`<div class="card"><div class="empty"><strong>No hay respaldos cargados</strong>Podés cargar uno nuevo o una fecha de una semana anterior.</div></div>`; document.getElementById('pg3').innerHTML=html; return; }
  html+=`<div class="card"><div class="section-head"><div><h3 class="section-title">Listado semanal</h3><p class="section-sub">Los respaldos también afectan el cierre de la semana.</p></div></div><div class="card-body table-wrap"><table><thead><tr><th>Fecha</th><th>Descripción</th><th>Monto</th><th></th></tr></thead><tbody>${arr.map(x=>`<tr><td>${fmtDate(normalizeDate(x))}</td><td>${escapeHtml(x.desc||'-')}</td><td class="money" style="color:var(--red)">$${money(x.monto)}</td><td><button class="btn btn-red btn-sm" onclick="deleteResp('${x.id}')">Borrar</button></td></tr>`).join('')}</tbody></table></div></div>`;
  document.getElementById('pg3').innerHTML=html;
}

function reportText(wk){
  const w=weekObj(wk), d=calcWeek(wk); const pct=Number(w.pct||0); const com=d.saldo>0?Math.round(d.saldo*pct/100):0;
  let txt=`📊 Reporte semanal - ${w.label}\n\n`;
  txt+=`💰 Cajas: $${money(d.cargas)}\n`;
  txt+=`🧾 Respaldos: $${money(d.respaldos)}\n`;
  if(d.carry) txt+=`↩️ Arrastre anterior: -$${money(d.carry)}\n`;
  txt+=`\n📌 Saldo neto: ${d.saldo<0?'-$':'$'}${money(Math.abs(d.saldo))}\n`;
  if(d.saldo<0) txt+=`❌ Comisión: $0\nSe arrastra: $${money(Math.abs(d.saldo))}`;
  else txt+=`✅ Comisión (${pct}%): $${money(com)}`;
  return txt;
}
function renderHistorial(){

}

function buildBackupPayload(){
  return {
    app:'Casino Online Pro',
    version:'v4',
    exportedAt:new Date().toISOString(),
    counts:{
      plataformas:gP().length,
      cajas:gC().length,
      premios:gPr().length,
      respaldos:gR().length,
      semanas:gW().length,
      usuarios:gU().length
    },
    data:{
      [KP]:gP(),
      [KC]:gC(),
      [KR]:gR(),
      [KW]:gW(),
      [KPR]:gPr(),
      [KU]:gU()
    }
  };
}
function fileStamp(){
  const d=new Date();
  const pad=n=>String(n).padStart(2,'0');
  return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'_'+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
}
function exportBackup(){
  try{
    const payload=buildBackupPayload();
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='casino_online_backup_'+fileStamp()+'.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1200);
    toast('Respaldo exportado');
  }catch(e){ toast('No se pudo exportar el respaldo',1); }
}
function quickExportBackup(){ exportBackup(); }
function importBackupFromInput(event){
  const file=event.target.files && event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const payload=JSON.parse(reader.result);
      if(!payload || !payload.data) throw new Error('invalid');
      [KP,KC,KR,KW,KPR,KU].forEach(key=>{
        if(!(key in payload.data)) throw new Error('missing');
      });
      if(!confirm('¿Restaurar este respaldo? Se van a reemplazar los datos actuales de esta app.')){ event.target.value=''; return; }
      sv(KP, payload.data[KP]);
      sv(KC, payload.data[KC]);
      sv(KR, payload.data[KR]);
      sv(KW, payload.data[KW]);
      sv(KPR, payload.data[KPR]);
      sv(KU, payload.data[KU]);
      event.target.value='';
      currentWeek();
      render();
      toast('Respaldo importado correctamente');
    }catch(err){
      event.target.value='';
      toast('Archivo inválido o incompleto',1);
    }
  };
  reader.readAsText(file);
}
